# Configuração do HyprLand

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
}

decoration {
    rounding = 10
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

}

animations {
    enabled = 1
    bezier = default, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = overshot, 0.13, 0.99, 0.29, 1.08
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 7, wind, slide
    animation = windowsIn, 1, 4, overshot, slidefade 5%
    animation = windowsOut, 1, 3, overshot, slidefade 5%
    animation = windowsMove, 1, 6, overshot, slidefade 5%
    animation = layers, 1, 5, default, slide
    animation = fadeIn, 1, 10, default
    animation = fadeOut, 1, 10, default
    animation = fadeSwitch, 1, 10, default
    animation = fadeShadow, 1, 10, default
    animation = fadeDim, 1, 10, default
    animation = fadeLayers, 1, 10, default
    animation = workspaces, 1, 7, overshot, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
}

# Fix JetBrains IDEs (PhpStorm, WebStorm) escala gigante no XWayland
env = _JAVA_OPTIONS,-Dsun.java2d.uiScale=0.75
env = GDK_DPI_SCALE,0.75
env = GDK_SCALE,0

xwayland {
  force_zero_scaling = false
}
